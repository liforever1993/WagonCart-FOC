name: Build

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    # Get required packages
    - uses: actions/checkout@v4
    - uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '9-2019-q4'

    # Build with make
    - name: make
      run: make
